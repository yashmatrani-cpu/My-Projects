<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function factorial(n) {
            if (n == 1) {
                return 1;
            }
            else if (n == 0) {
                return 1;
            }
            else {
                return n * factorial(n - 1);
            }
        }
        while (true) {
            console.log('welcome to facotrial calculator');
            ch = prompt('enter 1 for continue and 2 for exit:');
            if (ch === '1') {
                let a1 = prompt('enter number of which you have to find factorial');
                let a = Number(a1);
                let ans = (factorial(a));
                alert(`factorial is ${ans}`);
            }
            else if (ch === '2') {
                alert('thanks for using');
                break;
            }
            else {
                alert('invalid output');
            }
        }
    </script>
</body>

</html>
